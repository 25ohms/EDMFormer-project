workerPoolSpecs:
- replicaCount: 1
  machineSpec:
    machineType: g2-standard-24
    acceleratorType: NVIDIA_L4
    acceleratorCount: 2
  containerSpec:
    imageUri: us-central1-docker.pkg.dev/edmformer-project/edmformer-repo/edmformer-train:latest
    command:
    - python
    - src/task.py
    env:
    - name: TRAIN_BACKEND
      value: GPU
    - name: NUM_GPUS
      value: "2"
    - name: WANDB_MODE
      value: disabled
    - name: LABEL_PATH_GCS
      value: gs://edmformer-data/metadata/dataset.jsonl
    - name: SPLIT_IDS_PATH_GCS
      value: gs://edmformer-data/metadata/train.txt
    - name: EVAL_SPLIT_IDS_PATH_GCS
      value: gs://edmformer-data/metadata/val.txt
    - name: INPUT_EMBEDDING_DIR_GCS
      value: gs://edmformer-data/embeddings
    - name: EMBEDDING_SUBDIRS
      value: musicfm_30s,muq_30s,musicfm_420s,muq_420s
    - name: CHECKPOINT_DIR_GCS
      value: gs://edmformer-data/checkpoints/{run_id}
    - name: INIT_SEED
      value: "42"
    - name: DATALOADER_NUM_WORKERS
      value: "0"
    - name: DATALOADER_PREFETCH_FACTOR
      value: "0"
    - name: DATALOADER_PERSISTENT_WORKERS
      value: "0"
    - name: DATALOADER_PIN_MEMORY
      value: "0"
    - name: TRAIN_BATCH_SIZE
      value: "1"
    - name: EVAL_BATCH_SIZE
      value: "1"
    - name: ACCUMULATION_STEPS
      value: "1"
    - name: MAX_STEPS
      value: "1"
